<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>To Do List</title>
  </head>
  <body>
    <div>
      <header>
        <img
          src="ToDoListImgs/Register.png"
          alt="Your Digital List App Register"
          id="titleRegisterImg"
        />

      </header>
    </div>
    <div id="contentForm">
      <div id="wallpaper">
        <div class="bg">
            <div class="img img1"></div>
             <div class="img img2"></div>
            <div class="img img3"></div>
            <div class="img img4"></div>
            <form action="submit" id="formRegister">
        <div id="forForm">
        <input
          type="email"
          name="email"
          id="email"
          placeholder="Enter your Email"
        />
        <input
          type="password"
          name="password"
          id="password"
          placeholder="Enter your Password"
        />
        <input
          type="password"
          name="confirmPassword"
          id="confirmPassword"
          placeholder="Confirm your Password"
        />
        <div id="advices"></div>
        <div id="buttonContainer">
          <button id="buttonRegister">Register</button>
        </div>
        
        </div>
        <span id="buttonBackToLogin">

    <a href="index.html" id="backToLogin" class="button">Go back to Login</a>
  </span>

      </form>
        </div>
      
      
      
      
      </div>
      
    

    </div>

    <footer>
      <p>&copy;Created at 2026</p>
    </footer>
    <script type="module" src="app.js"></script>
  </body>
</html>
